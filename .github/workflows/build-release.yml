name: Build Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          validate-wrappers: false

      - name: Verify Release Secrets
        run: |
          MISSING_SECRETS=()
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then MISSING_SECRETS+=("KEYSTORE_BASE64"); fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then MISSING_SECRETS+=("KEYSTORE_PASSWORD"); fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then MISSING_SECRETS+=("KEY_ALIAS"); fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then MISSING_SECRETS+=("KEY_PASSWORD"); fi
          
          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "::error::Missing required release secrets: ${MISSING_SECRETS[*]}"
            echo "Please set up these secrets in your GitHub repository: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -di > app/release-key.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: "release-key.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --parallel --build-cache

      - name: Rename artifacts with version
        id: rename
        run: |
          VERSION="${{ github.event.inputs.version_name }}"
          BUILD="${{ github.run_number }}"
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)

          APK_NAME="second-brain-v${VERSION}-build${BUILD}.apk"

          mkdir -p release-artifacts
          cp "$APK_SRC" "release-artifacts/$APK_NAME"

          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: release-artifacts/${{ steps.rename.outputs.apk_name }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.rename.outputs.version }}-build${{ github.run_number }}
          name: "Second Brain v${{ steps.rename.outputs.version }} (Build #${{ github.run_number }})"
          body: |
            Automated production build for Second Brain.

            ### Artifacts
            - `${{ steps.rename.outputs.apk_name }}` — direct install
          draft: false
          prerelease: false
          files: |
            release-artifacts/${{ steps.rename.outputs.apk_name }}