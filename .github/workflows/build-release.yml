name: Build Release
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (leave blank to use auto-generated notes)'
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'app/build.gradle.kts'

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      version_name: ${{ steps.check.outputs.version_name }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and compare to last release
        id: check
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "Detected versionName: $VERSION"

          if [ -z "$VERSION" ]; then
            echo "::error::Could not extract versionName from app/build.gradle.kts"
            exit 1
          fi

          # Only consider tags that look like our own release tags: v<anything>
          # Sorted by version so the *highest* tag wins, not just the most recent commit-wise
          LAST_TAG=$(git tag -l 'v*' | sort -V | tail -n1 || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous release tag found — this is the first release"
            LAST_VERSION=""
          else
            LAST_VERSION="${LAST_TAG#v}"
            echo "Last released version: $LAST_VERSION (tag: $LAST_TAG)"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — building regardless of version"
          elif [ "$VERSION" != "$LAST_VERSION" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Version changed ($LAST_VERSION -> $VERSION) — building"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($VERSION) — skipping build"
          fi

          echo "version_name=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          validate-wrappers: false

      - name: Verify Release Secrets
        run: |
          MISSING_SECRETS=()
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then MISSING_SECRETS+=("KEYSTORE_BASE64"); fi
          if [ -z "${{ secrets.KEYSTORE_PASSWORD }}" ]; then MISSING_SECRETS+=("KEYSTORE_PASSWORD"); fi
          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then MISSING_SECRETS+=("KEY_ALIAS"); fi
          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then MISSING_SECRETS+=("KEY_PASSWORD"); fi

          if [ ${#MISSING_SECRETS[@]} -ne 0 ]; then
            echo "::error::Missing required release secrets: ${MISSING_SECRETS[*]}"
            echo "Please set up these secrets in your GitHub repository: Settings -> Secrets and variables -> Actions"
            exit 1
          fi

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -di > app/release-key.jks

      - name: Build Release APK
        env:
          KEYSTORE_PATH: "release-key.jks"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --parallel --build-cache

      - name: Rename artifacts with version
        id: rename
        run: |
          VERSION="${{ needs.check-version.outputs.version_name }}"
          APK_SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          APK_NAME="second-brain-v${VERSION}.apk"
          mkdir -p release-artifacts
          cp "$APK_SRC" "release-artifacts/$APK_NAME"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: release-artifacts/${{ steps.rename.outputs.apk_name }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version_name }}
          name: "Second Brain v${{ needs.check-version.outputs.version_name }}"
          generate_release_notes: true
          append_body: true
          body: ${{ github.event.inputs.release_notes }}
          draft: false
          prerelease: false
          files: |
            release-artifacts/${{ steps.rename.outputs.apk_name }}
