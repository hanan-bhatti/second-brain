AutoName: Second Brain
Summary: Universal offline-first note capture and personal knowledge archive
Description: |-
  Second Brain is a minimalist, offline-first personal knowledge archive and universal capture app for Android. Designed to eliminate the friction of digital hoarding and info fragmentation, Second Brain acts as your central repository for ideas, documents, audio clips, snapshots, and shared web content.

  Features:
  - Universal & Rapid Capture: Ingest text, markdown, images, video clips, and web URLs directly.
  - Floating OCR & Region Capture HUD: Select regions of screen contents to convert visual info into text notes.
  - Multi-Language & RTL Text Support: Automatic detection and layout adjustment for RTL scripts (Urdu, Arabic, Hebrew).
  - Voice Memos: Record audio notes with waveform visualization.
  - Local-First Privacy: Powered by SQLite Room database, keeping data on device.
